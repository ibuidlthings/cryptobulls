# Surfpool / local validator — clone the Metaplex Token Metadata program
# from mainnet at startup so wrap_bull / unwrap_bull CPI calls work locally.
# Without this, the test validator has no metadata program and CPI calls
# fail with InvalidProgramExecutable.
[test.validator]
url = "https://api.mainnet-beta.solana.com"

[[test.validator.clone]]
address = "metaqbxxUerdq28cj1RbAWkYQm3ybzjb6a8bt518x1s"
